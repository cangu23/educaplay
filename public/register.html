<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eduplay - Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>REGISTRO</h1>
            <p class="login-subtitle">Crear nueva cuenta</p>

            <div id="msg" style="font-size: 0.9rem; margin-bottom: 15px; min-height: 20px;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" placeholder="Nombre de Usuario" required>
                </div>
                <div class="form-group">
                    <label for="cedula">Cédula de Identidad</label>
                    <input type="text" id="cedula" placeholder="Cédula de Identidad" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <div class="form-group">
                    <label for="rol">Tipo de Usuario</label>
                    <select id="rol">
                        <option value="estudiante">Estudiante</option>
                        <option value="profesor">Profesor</option>
                    </select>
                </div>
                <button type="submit" id="regBtn" class="btn btn-primary" style="width: 100%;">Registrar Cuenta</button>
            </form>
            <p style="text-align: center; font-size: 0.9rem; margin-top: 20px; color: var(--text-muted);">
                ¿Ya tienes cuenta? <a href="index.html" style="color: var(--accent-color); text-decoration: none; font-weight: bold;">Inicia sesión</a>
            </p>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    cedula: document.getElementById('cedula').value,
                    password: document.getElementById('password').value,
                    rol: document.getElementById('rol').value
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                window.location.href = 'index.html';
            } else {
                const msgDiv = document.getElementById('msg');
                document.getElementById('msg').style.color = "#ff6b6b";
                msgDiv.innerText = data.error || "Error al registrar";
                btn.disabled = false;
                btn.innerText = "Registrar Cuenta";
            }
        };
    </script>
</body>
</html>
