<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eduplay - Perfil de Agente</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="assets/logo.png" alt="Eduplay" class="logo-img" onclick="location.href='index.html'" style="cursor:pointer;">
            <h2 style="margin: 0; font-size: 1.2rem; color: var(--primary-dark);">Eduplay OS // Perfil</h2>
        </div>
        <nav>
            <a href="index.html" class="btn btn-secondary" style="display: inline-flex; align-items: center; gap: 5px; margin-right: 10px;">
                <span class="material-icons" style="font-size: 18px;">home</span> Inicio
            </a>
            <button onclick="history.back()" class="btn btn-secondary">Volver al Panel</button>
        </nav>
    </header>

    <main class="container">
        <div class="widget" style="max-width: 600px; margin: 0 auto; border-top: 4px solid var(--primary-color);">
            <div class="profile-header" style="justify-content: center; text-align: center; flex-direction: column;">
                <div class="profile-avatar-large" id="current-avatar-preview" style="margin-bottom: 15px;">
                    <span class="material-icons" style="font-size: 5rem;">account_circle</span>
                </div>
                <div class="profile-info-main">
                    <h1 id="display-username" style="margin-bottom: 5px;">CARGANDO...</h1>
                    <p id="display-role" style="color: var(--primary-color); font-weight: bold; margin-bottom: 10px;"></p>
                    <div class="stat-value" id="display-score" style="font-size: 1.2rem; color: var(--success-color);">0 PTS</div>
                </div>
            </div>

            <form id="profileForm" style="margin-top: 30px;">
                <div class="form-group">
                    <label>Firma Visual (Avatar)</label>
                    <div class="avatar-grid" id="avatar-selector">
                        <div class="avatar-option" data-avatar="agente_1">👤</div>
                        <div class="avatar-option" data-avatar="agente_2">🕵️</div>
                        <div class="avatar-option" data-avatar="agente_3">🤖</div>
                        <div class="avatar-option" data-avatar="agente_4">🛡️</div>
                        <div class="avatar-option" data-avatar="agente_5">⚡</div>
                        <div class="avatar-option" data-avatar="agente_6">💻</div>
                    </div>

                    <div style="margin-top: 15px; border-top: 1px solid #262626; padding-top: 15px;">
                        <label for="input-url">O usar una URL de internet:</label>
                        <input type="url" id="input-url" placeholder="https://ejemplo.com/imagen.png" style="font-size: 0.8rem; padding: 8px; margin-bottom: 10px;">
                        
                        <label for="input-file">O cargar desde tu equipo:</label>
                        <input type="file" id="input-file" accept="image/*" style="font-size: 0.8rem; padding: 8px; border: none; background: transparent;">
                    </div>

                    <input type="hidden" id="input-avatar" value="agente_1">
                </div>

                <div class="form-group">
                    <label for="bio">Biografía / Notas de Campo</label>
                    <textarea id="bio" rows="4" placeholder="Escribe tu descripción técnica aquí..." style="width: 100%; background: #050505; color: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; font-family: inherit; resize: none;"></textarea>
                </div>

                <div id="save-msg" style="margin-bottom: 15px; font-size: 0.9rem; text-align: center;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sincronizar Datos</button>
            </form>

            <!-- Nueva Sección de Seguridad -->
            <div style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 25px;">
                <h3 style="font-size: 1rem; color: var(--danger-color); margin-bottom: 15px;">⚙️ SEGURIDAD DE LA CUENTA</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="currentPassword">Contraseña Actual</label>
                        <input type="password" id="currentPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Nueva Contraseña</label>
                        <input type="password" id="newPassword" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <div id="pass-msg" style="margin-bottom: 15px; font-size: 0.9rem; text-align: center;"></div>
                    <button type="submit" class="btn btn-secondary" style="width: 100%; border-color: var(--danger-color); color: var(--danger-color);">Actualizar Contraseña</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const userId = localStorage.getItem('userId');
        const token = localStorage.getItem('token');
        const avatars = { 'agente_1': '👤', 'agente_2': '🕵️', 'agente_3': '🤖', 'agente_4': '🛡️', 'agente_5': '⚡', 'agente_6': '💻' };

        if (!token) window.location.href = 'index.html';

        async function init() {
            const res = await fetch(`/api/user/${userId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const user = await res.json();

            document.getElementById('display-username').innerText = user.username.toUpperCase();
            document.getElementById('display-role').innerText = `RANGO: ${user.rol.toUpperCase()}`;
            document.getElementById('display-score').innerText = `${user.total_score || 0} PUNTOS ACUMULADOS`;
            document.getElementById('bio').value = user.descripcion || '';
            
            const currentAvatar = user.avatar || 'agente_1';
            document.getElementById('input-avatar').value = currentAvatar;

            const preview = document.getElementById('current-avatar-preview');
            if (avatars[currentAvatar]) {
                preview.innerHTML = `<span style="font-size: 5rem;">${avatars[currentAvatar]}</span>`;
                const opt = document.querySelector(`.avatar-option[data-avatar="${currentAvatar}"]`);
                if (opt) opt.classList.add('selected');
            } else {
                preview.innerHTML = `<img src="${currentAvatar}" style="width: 100%; height: 100%; object-fit: cover;">`;
                if (currentAvatar.startsWith('http')) {
                    document.getElementById('input-url').value = currentAvatar;
                }
            }
        }

        // Selector de Avatares
        document.getElementById('avatar-selector').onclick = (e) => {
            const opt = e.target.closest('.avatar-option');
            if (!opt) return;
            document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            const av = opt.dataset.avatar;
            document.getElementById('input-avatar').value = av;
            document.getElementById('current-avatar-preview').innerHTML = `<span style="font-size: 5rem;">${avatars[av]}</span>`;
            // Limpiar otros campos para evitar confusión
            document.getElementById('input-url').value = "";
            document.getElementById('input-file').value = "";
        };

        // Manejar URL de imagen externa
        document.getElementById('input-url').oninput = (e) => {
            const url = e.target.value;
            if (url) {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                document.getElementById('input-avatar').value = url;
                document.getElementById('current-avatar-preview').innerHTML = `<img src="${url}" style="width: 100%; height: 100%; object-fit: cover;">`;
                document.getElementById('input-file').value = "";
            }
        };

        // Manejar carga de archivo local (desde el equipo)
        document.getElementById('input-file').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result;
                    document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                    document.getElementById('input-avatar').value = base64;
                    document.getElementById('current-avatar-preview').innerHTML = `<img src="${base64}" style="width: 100%; height: 100%; object-fit: cover;">`;
                    document.getElementById('input-url').value = "";
                };
                reader.readAsDataURL(file);
            }
        };

        // Guardar cambios
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('save-msg');
            btn.disabled = true;
            
            const res = await fetch('/api/user/update', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    avatar: document.getElementById('input-avatar').value,
                    descripcion: document.getElementById('bio').value
                })
            });
            
            if (res.ok) { msg.style.color = "var(--success-color)"; msg.innerText = "¡Base de datos actualizada!"; }
            else { msg.style.color = "var(--danger-color)"; msg.innerText = "Error en la conexión."; }
            btn.disabled = false;
        };

        // Nueva Lógica para cambiar contraseña
        document.getElementById('passwordForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('pass-msg');
            const btn = e.target.querySelector('button');
            btn.disabled = true;

            const res = await fetch('/api/user/change-password', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    currentPassword: document.getElementById('currentPassword').value,
                    newPassword: document.getElementById('newPassword').value
                })
            });

            const data = await res.json();
            if (res.ok) {
                msg.style.color = "var(--success-color)";
                msg.innerText = "¡Contraseña actualizada!";
                e.target.reset();
            } else {
                msg.style.color = "var(--danger-color)";
                msg.innerText = data.error || "Error al actualizar.";
            }
            btn.disabled = false;
        };

        init();
    </script>
</body>
</html>
