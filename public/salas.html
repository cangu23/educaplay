<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eduplay - Gestión de Salas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img src="assets/logo.png" alt="Eduplay" class="logo-img">
        <nav><a href="teacher_dashboard.html" class="btn btn-secondary">Volver al Panel</a></nav>
    </header>
    <main class="container">
        <div class="login-card" style="max-width: 500px; margin: 0 auto;">
            <h2>Crear Nueva Sala de Entrenamiento</h2>
            <form id="createRoomForm">
                <div class="form-group"><label>Duración (Minutos)</label><input type="number" id="duracion" value="60" required></div>
                <div class="form-group"><label>Capacidad Máxima</label><input type="number" id="capacidad" value="30" required></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Generar Código de Acceso</button>
            </form>
            <div id="room-result" class="hidden" style="margin-top: 20px;">
                <p>Sala Creada con Éxito. Código:</p>
                <div class="codigo-box" id="new-room-code">------</div>
                <button class="btn btn-secondary" onclick="location.href='teacher_dashboard.html'" style="width: 100%; margin-top: 10px;">Volver al Dashboard</button>
            </div>
        </div>
    </main>
    <script>
        document.getElementById('createRoomForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/salas/crear', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${localStorage.getItem('token')}` 
                },
                body: JSON.stringify({
                    docente_id: localStorage.getItem('userId'),
                    duracion: document.getElementById('duracion').value,
                    capacidad: document.getElementById('capacidad').value,
                    game_url: 'local'
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('createRoomForm').classList.add('hidden');
                document.getElementById('room-result').classList.remove('hidden');
                document.getElementById('new-room-code').innerText = data.codigo;
            } else { alert(data.error || "No se pudo crear la sala"); }
        };
    </script>
</body>
</html>
