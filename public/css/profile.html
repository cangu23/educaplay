<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eduplay - Mi Perfil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 15px; cursor: pointer;" onclick="location.href='index.html'">
                <img src="assets/logo.png" alt="Eduplay" style="height: 30px;">
                <h1 style="margin: 0; font-size: 1.5rem;">Mi Perfil</h1>
            </div>
            <nav style="display: flex; gap: 10px;">
                <a href="index.html" class="btn btn-secondary">Inicio</a>
                <a href="teacher_dashboard.html" id="back-link" class="btn btn-secondary">Volver</a>
            </nav>
        </header>

        <div class="widget">
            <div class="profile-header">
                <div id="current-avatar" class="profile-avatar-large">👤</div>
                <div class="profile-info-main">
                    <h1 id="prof-username">Cargando...</h1>
                    <p id="prof-rol" class="login-subtitle" style="margin-bottom: 10px;"></p>
                    <div class="stat-item" style="display: inline-block; padding: 5px 15px;">
                        Total Puntos: <strong id="prof-score" class="score-val">0</strong>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Cambiar Avatar</label>
                <div class="avatar-grid" id="avatar-selector">
                    <div class="avatar-option" data-id="agente_1">🛡️</div>
                    <div class="avatar-option" data-id="agente_2">🕵️</div>
                    <div class="avatar-option" data-id="agente_3">🚀</div>
                    <div class="avatar-option" data-id="agente_4">🤖</div>
                    <div class="avatar-option" data-id="agente_5">💻</div>
                </div>
            </div>

            <div class="form-group">
                <label>Descripción / Bio</label>
                <textarea id="prof-desc" style="width:100%; height:100px; background:#0a0c14; color:white; border:1px solid var(--border-color); border-radius:4px; padding:10px; font-family:inherit;"></textarea>
            </div>

            <button onclick="saveProfile()" class="btn btn-primary">Guardar Cambios</button>
        </div>
    </div>

    <script>
        const avatars = { agente_1: '🛡️', agente_2: '🕵️', agente_3: '🚀', agente_4: '🤖', agente_5: '💻' };
        let selectedAvatar = 'agente_1';

        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('userId');
            if (!userId) window.location.href = 'index.html';

            const res = await fetch(`/api/user/${userId}`);
            const data = await res.json();

            document.getElementById('prof-username').innerText = data.username;
            document.getElementById('prof-rol').innerText = data.rol.toUpperCase();
            document.getElementById('prof-score').innerText = data.total_score;
            document.getElementById('prof-desc').value = data.descripcion;
            selectedAvatar = data.avatar || 'agente_1';
            updateAvatarUI();

            if (data.rol === 'estudiante') document.getElementById('back-link').href = 'student_dashboard.html';
        });

        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.onclick = () => {
                selectedAvatar = opt.dataset.id;
                updateAvatarUI();
            };
        });

        function updateAvatarUI() {
            document.getElementById('current-avatar').innerText = avatars[selectedAvatar];
            document.querySelectorAll('.avatar-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.id === selectedAvatar);
            });
        }

        async function saveProfile() {
            await fetch('/api/user/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: localStorage.getItem('userId'),
                    avatar: selectedAvatar,
                    descripcion: document.getElementById('prof-desc').value
                })
            });
            alert('Perfil actualizado');
        }
    </script>
</body>
</html>
